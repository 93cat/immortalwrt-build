name: Build CLX S20M

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/93cat/immortalwrt-mt798x
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone $REPO_URL immortalwrt

    - name: Update feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate base config and enable device
      working-directory: immortalwrt
      run: |
        # 生成默认配置
        make defconfig
        # 启用你的设备（假设设备定义名为 clx_s20m，属于 mediatek/filogic 目标）
        ./scripts/config --enable TARGET_mediatek
        ./scripts/config --enable TARGET_mediatek_filogic
        ./scripts/config --enable TARGET_DEVICE_mediatek_filogic_DEVICE_clx_s20m
        # 可选：添加常用软件包
        ./scripts/config --enable CONFIG_PACKAGE_luci
        # 重新生成配置以解决依赖
        make defconfig

    - name: Download package sources
      working-directory: immortalwrt
      run: make download -j8

    - name: Compile firmware
      working-directory: immortalwrt
      run: make -j$(nproc) || make -j1 V=s

    - name: Rename firmware with date
      run: |
        cd immortalwrt/bin/targets/*/*
        for f in *.bin; do
          mv "$f" "${f%.bin}_$(TZ=Asia/Shanghai date +"%Y%m%d_%H%M").bin"
        done

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: clx-s20m-firmware
        path: immortalwrt/bin/targets/*/*/*.bin
